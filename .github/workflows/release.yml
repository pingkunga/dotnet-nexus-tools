name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: ubuntu-latest
            suffix: .zip
          - rid: linux-x64
            os: ubuntu-latest
            suffix: .tar.gz
          - rid: osx-x64
            os: ubuntu-latest
            suffix: .tar.gz
          - rid: osx-arm64
            os: ubuntu-latest
            suffix: .tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract Version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Processing version: $VERSION"

      - name: Publish Binary
        run: |
          dotnet publish -c Release -r ${{ matrix.rid }} \
            -p:PublishSingleFile=true \
            --self-contained true \
            -p:Version=${{ env.VERSION }} \
            -o ./publish/${{ matrix.rid }}

      - name: Package Windows (Zip)
        if: matrix.rid == 'win-x64'
        shell: bash
        run: |
          cd ./publish/${{ matrix.rid }}
          zip -r ../../nexus-component-counter-${{ matrix.rid }}.zip .

      - name: Package Linux/macOS (Tar)
        if: matrix.rid != 'win-x64'
        shell: bash
        run: |
          cd ./publish/${{ matrix.rid }}
          tar -czvf ../../nexus-component-counter-${{ matrix.rid }}.tar.gz .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.rid }}
          path: nexus-component-counter-${{ matrix.rid }}${{ matrix.suffix }}

  create-release:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract Version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Pack NuGet Tool
        run: dotnet pack -c Release -p:Version=${{ env.VERSION }} -o ./dist

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/*.zip
            ./artifacts/*.tar.gz
            ./dist/*.nupkg
          name: Release ${{ env.VERSION }}
          generate_release_notes: true
          draft: false
          prerelease: false
